name: CI/CD Pipeline

on:
  push:
    branches: 
      - dev
  pull_request:
    branches: 
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --no-restore --configuration Release

    - name: Run Unit Tests
      run: dotnet test InnovaFunding.Functions.UnitTesting/ --no-build --configuration Release --collect:"XPlat Code Coverage"

    - name: Run Integration Tests
      run: dotnet test InnovaFunding.Functions.IntegrationTest/ --no-build --configuration Release
      env:
        ConnectionStrings__AzureConnection: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Publish project
      run: dotnet publish InnovaFunding.Functions/InnovaFunding.Functions.csproj -c Release -o ./publish

    - name: List publish folder
      run: ls -R ./publish

    - name: Deploy to Azure Functions
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
        package: ./publish
