name: CI/CD Pipeline

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore SunatIntegration.sln

    - name: Build solution
      run: dotnet build SunatIntegration.sln --no-restore --configuration Release

    - name: Run Unit Tests
      run: dotnet test Test/SunatIntegration.Tests/SunatIntegration.Tests.csproj --no-build --configuration Release --collect:"XPlat Code Coverage"

    - name: Run Integration Tests
      run: dotnet test Test/SunatIntegration.IntegrationTests/SunatIntegration.IntegrationTests.csproj --no-build --configuration Release

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Publish project
      run: dotnet publish Src/SunatIntegration.Functions/SunatIntegration.Functions.csproj -c Release -o ./publish

    - name: List publish folder
      run: ls -R ./publish

    - name: Deploy to Azure Functions
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
        package: ./publish
