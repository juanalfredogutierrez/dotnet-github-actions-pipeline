name: .NET CI/CD Pipeline

on:
  push:
    branches:
      - main
      - development

  pull_request:
    branches:
      - main

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_FILE: 'SunatIntegration.sln'
  FUNCTION_PROJECT: '**/SunatIntegration.Functions.csproj'

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_FILE }}

    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore

    - name: Run Unit Tests
      run: dotnet test **/SunatIntegration.Tests.csproj --configuration Release --no-build

    - name: Run Integration Tests
      run: dotnet test **/SunatIntegration.IntegrationTests.csproj --configuration Release --no-build

    - name: Publish Azure Function
      run: dotnet publish ${{ env.FUNCTION_PROJECT }} --configuration Release --output publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: functionapp
        path: publish


  deploy:

    needs: build
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: functionapp
        path: publish

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy Azure Function
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
        package: publish
