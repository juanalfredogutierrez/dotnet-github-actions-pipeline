name: Enterprise CI/CD Azure Function - Multi-Job Fixed

on:
  push:
    branches: [ "development", "main" ]
  pull_request:
    branches: [ "development", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      # Restore dependencies
      - name: Restore dependencies
        run: dotnet restore SunatIntegration.sln

      # Build Unit Test Project
      - name: Build Unit Test Project
        run: |
          TEST_PROJECT=$(find . -name "SunatIntegration.Tests.csproj" | head -n 1)
          dotnet build "$TEST_PROJECT" -c Release

      # Run Unit Tests
      - name: Run Unit Tests
        run: |
          TEST_PROJECT=$(find . -name "SunatIntegration.Tests.csproj" | head -n 1)
          dotnet test "$TEST_PROJECT" -c Release --collect:"XPlat Code Coverage" --verbosity normal

      # Run Integration Tests
      - name: Run Integration Tests
        run: |
          INTEGRATION_PROJECT=$(find . -name "SunatIntegration.IntegrationTests.csproj" | head -n 1)
          dotnet test "$INTEGRATION_PROJECT" -c Release --verbosity normal

      # Publish Azure Function
      - name: Publish Azure Function
        id: publish-func
        run: |
          FUNCTION_PROJECT=$(find . -name "SunatIntegration.Functions.csproj" | head -n 1)
          dotnet publish "$FUNCTION_PROJECT" -c Release -o ./publish --self-contained false --verbosity normal

      # List files for debug
      - name: List publish folder
        run: ls -R ./publish

      # Upload publish artifact
      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-function-publish
          path: ./publish

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/development' || github.ref == 'refs/heads/main'
    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      # Download artifact
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: azure-function-publish
          path: ./publish

      # Flatten folder to ensure Azure sees correct structure
      - name: Flatten publish folder
        run: |
          # Detect extra subfolder created by artifact
          if [ -d ./publish/azure-function-publish ]; then
            mv ./publish/azure-function-publish/* ./publish/
          fi
          ls -R ./publish  # Debug: verify files

      # Azure login
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Deploy
      - name: Deploy to Azure Functions
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ./publish
          slot-name: production
